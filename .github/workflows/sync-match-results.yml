name: Sync Match Results

on:
  schedule:
    # Every 5 minutes during match hours: 15:00–08:59 UTC
    # Earliest kick-off: 12:00 UTC-4 = 16:00 UTC
    # Latest possible finish (with extra time): ~06:00 UTC
    - cron: '*/5 15-23,0-8 * * *'
  workflow_dispatch: # Allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Sync finished match results
        run: node scripts/sync-match-results.js
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
